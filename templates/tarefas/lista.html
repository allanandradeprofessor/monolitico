<h1>Minhas Tarefas</h1>

<a href="{% url 'criar_tarefa' %}">Nova Tarefa</a>

<ul>
  {% for tarefa in tarefas %}
    <li>
      <strong>{{ tarefa.nome }}</strong> - {{ tarefa.status }}

      <a href="{% url 'editar_tarefa' tarefa.id %}">Editar</a>
      <a href="{% url 'deletar_tarefa' tarefa.id %}">Deletar</a>
    </li>
  {% endfor %}
</ul>
